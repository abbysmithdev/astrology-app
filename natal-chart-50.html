function buildSourcePanel(planet, sign, degree, isRetro, aspect) {
  const container = document.getElementById('skySourceContent');
  container.innerHTML = '';
  const natal = currentChartData ? currentChartData.pos : null;

  function item(label, value) {
    const div = document.createElement('div');
    div.className = 'sky-source-item';
    div.innerHTML = '<strong>' + label + '</strong>: ' + value;
    container.appendChild(div);
  }

  function fmtPos(lon) {
    if (lon == null) return '?';
    const s = getSign(lon);
    return s.sign + ' ' + s.degree.toFixed(1) + '°';
  }

  function aspectBetween(lonA, lonB, wideOrb) {
    const extra = wideOrb ? 2 : 0;
    const ASPECTS = [
      {name:'conjunct', angle:0, orb:8+extra},
      {name:'opposite', angle:180, orb:8+extra},
      {name:'trine', angle:120, orb:8+extra},
      {name:'square', angle:90, orb:7+extra},
      {name:'sextile', angle:60, orb:6+extra},
    ];
    const diff = normDeg(lonA - lonB);
    const angle = diff > 180 ? 360 - diff : diff;
    for (const asp of ASPECTS) {
      const orb = Math.abs(angle - asp.angle);
      if (orb <= asp.orb) return asp.name + ' (orb ' + orb.toFixed(1) + '°)';
    }
    return null;
  }

  if (planet) {
    // Planet transit row
    const skyPos = getSkyPositions();
    const transitLon = skyPos[planet] ? skyPos[planet].lon : null;
    item('Transit ' + (PLANET_NAMES[planet] || planet), fmtPos(transitLon) + (isRetro ? ' Rx' : ''));

    // Check aspects to natal personal points
    if (natal && transitLon != null) {
      const personalPoints = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','ASC','MC'];
      const found = [];
      for (const np of personalPoints) {
        if (natal[np] == null) continue;
        const wideOrb = (np === 'ASC' || np === 'MC');
        const asp = aspectBetween(transitLon, natal[np], wideOrb);
        if (asp) found.push({np, asp});
      }
      if (found.length) {
        found.forEach(({np, asp}) => {
          item('Natal ' + (PLANET_NAMES[np] || np) + ' ' + fmtPos(natal[np]), asp);
        });
      }

    }
  } else if (aspect) {
    // Sky aspect
    const skyPos = getSkyPositions();
    const lon1 = skyPos[aspect.p1] ? skyPos[aspect.p1].lon : null;
    const lon2 = skyPos[aspect.p2] ? skyPos[aspect.p2].lon : null;
    item('Transit ' + aspect.p1, fmtPos(lon1));
    item('Transit ' + aspect.p2, fmtPos(lon2));
    item('Aspect', aspect.name + ' ' + aspect.glyph + (aspect.tight ? ' (tight, orb ' + aspect.orb + '°)' : ' (orb ' + aspect.orb + '°)'));
    item('Effect', aspect.desc);

  }
}

function renderSkyModalText(el, text) {
  el.className = 'sky-modal-body';
  el.innerHTML = '';
  const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  if (paragraphs.length <= 1) {
    el.textContent = text;
    return;
  }
  for (const p of paragraphs) {
    const div = document.createElement('p');
    div.style.cssText = 'margin-bottom:1rem;line-height:1.8;';
    div.textContent = p;
    el.appendChild(div);
  }
}

function openSkyModal(planet, sign, degree, isRetro, generalNote, aspect, _unused) {
  const modal = document.getElementById('skyModalOverlay');
  const titleEl = document.getElementById('skyModalTitle');
  const bodyEl = document.getElementById('skyModalBody');

  let title, cacheKey;
  if (planet) {
    title = isRetro
      ? (PLANET_NAMES[planet] || planet) + ' Retrograde in ' + sign
      : (PLANET_NAMES[planet] || planet) + ' in ' + sign;
    cacheKey = 'sky-blurb-' + planet + '-' + sign + '-' + (isRetro ? 'R' : 'D');
  } else {
    title = aspect.p1 + ' ' + aspect.glyph + ' ' + aspect.p2;
    cacheKey = 'sky-blurb-asp-' + aspect.p1 + '-' + aspect.name + '-' + aspect.p2;
  }

  titleEl.textContent = title;
  modal.classList.add('open');

  // Reset source panel
  document.getElementById('skySourcePanel').classList.remove('open');
  buildSourcePanel(planet, sign, degree, isRetro, aspect);

  // Check localStorage cache (keyed by transit sign, auto-invalidates when planet changes sign)
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      renderSkyModalText(bodyEl, cached);
      return;
    }
  } catch(_) {}

  bodyEl.className = 'sky-modal-body loading';
  bodyEl.textContent = 'Loading...';

  streamSkyBlurb(planet, sign, degree, isRetro, aspect, cacheKey, bodyEl);
}

function closeSkyModal() {
  document.getElementById('skyModalOverlay').classList.remove('open');
  document.getElementById('skySourcePanel').classList.remove('open');
}

async function streamSkyBlurb(planet, sign, degree, isRetro, aspect, cacheKey, el) {
  const settings = getSettings();
  if (!settings.apiKey) {
    el.className = 'sky-modal-body';
    el.textContent = 'Add your API key in Settings to enable interpretations.';
    return;
  }

  const chart = getActiveChart();
  const natalStr = currentChartData
    ? PLANET_ORDER.filter(p => currentChartData.pos[p] != null)
        .map(p => { const s = getSign(currentChartData.pos[p]); return (PLANET_NAMES[p]||p) + ': ' + s.sign + ' ' + s.degree.toFixed(1) + '\u00b0'; }).join(', ')
    : '';

  let prompt;
  if (planet) {
    prompt = [
      'You are writing a short astrology blurb (80-100 words).',
      natalStr ? 'The reader\'s natal chart: ' + natalStr : '',
      '',
      isRetro
        ? (PLANET_NAMES[planet]||planet) + ' is currently retrograde in ' + sign + '.'
        : (PLANET_NAMES[planet]||planet) + ' is currently in ' + sign + '.',
      '',
      'Write exactly two paragraphs separated by a blank line.',
      'Paragraph 1: What this transit means generally right now (2-3 sentences).',
      'Paragraph 2 (after a blank line): How this specifically affects the reader given their natal chart (2-3 sentences).',
      '',
      'Rules: address the reader as "you". No name. No em dashes or en dashes. No AI cliches (no "delve", "navigate", "tapestry", "lean into", "embrace", "the universe is asking"). Dry and observational tone. No markdown.',
    ].filter(Boolean).join('\n');
  } else {
    prompt = [
      'You are writing a short astrology blurb (80-100 words).',
      natalStr ? 'The reader\'s natal chart: ' + natalStr : '',
      '',
      aspect.p1 + ' and ' + aspect.p2 + ' are currently ' + aspect.name + ' in the sky.',
      'This aspect is described as: ' + aspect.desc + '.',
      aspect.tight ? 'This is a tight aspect (under 2.5 degrees), so the effect is strong.' : '',
      '',
      'Write exactly two paragraphs separated by a blank line.',
      'Paragraph 1: What this sky aspect means generally right now (2-3 sentences).',
      'Paragraph 2 (after a blank line): How this specifically affects the reader given their natal chart (2-3 sentences).',
      '',
      'Rules: address the reader as "you". No name. No em dashes or en dashes. No AI cliches. Dry and observational tone. No markdown.',
    ].filter(Boolean).join('\n');
  }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:300, stream:true,
        messages:[{role:'user', content:prompt}]})
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message||'API error'); }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '', first = true, full = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const ls = buf.split('\n'); buf = ls.pop();
      for (const line of ls) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const delta = JSON.parse(raw).delta?.text || '';
          if (delta) {
            if (first) { first = false; }
            full += delta;
          }
        } catch(_) {}
      }
    }
    if (full) {
      renderSkyModalText(el, full);
      try {
        localStorage.setItem(cacheKey, full);
        // Clean up old sky blurb entries if too many accumulate
        const skyKeys = Object.keys(localStorage).filter(k => k.startsWith('sky-blurb-'));
        if (skyKeys.length > 60) skyKeys.forEach(k => localStorage.removeItem(k));
      } catch(_) {}
    }
  } catch(e) {
    el.className = 'sky-modal-body';
    el.textContent = 'Could not load: ' + e.message;
  }
}

function initSky() {
  try {
    document.getElementById('skyDate').textContent = new Date().toLocaleDateString('en-US',
      {weekday:'long', month:'long', day:'numeric'});
    const skyPos = getSkyPositions();
    buildSkyTable(skyPos);
    const aspects = getSkyAspects(skyPos);
    buildSkyAspectTable(aspects);
  } catch(e) {
    document.getElementById('skyTable').innerHTML = '<div class="chart-table-empty">Error loading sky: ' + e.message + '</div>';
    console.error('initSky error:', e);
  }
}

function migrateOldData() {
  const oldBirth = JSON.parse(localStorage.getItem('natal-birth') || 'null');
  const oldKey = localStorage.getItem('natal-api-key');
  const charts = getCharts();
  const settings = getSettings();
  if (oldKey && !settings.apiKey) { saveSettings({...settings, apiKey:oldKey}); localStorage.removeItem('natal-api-key'); }
  if (oldBirth && !charts.length) {
    const m = {id:genId(), name:'My Chart', dateStr:oldBirth.dateStr, timeStr:oldBirth.timeStr, lat:oldBirth.lat, lon:oldBirth.lon, city:oldBirth.city||'', region:oldBirth.region||'', utcOffset:oldBirth.utcOffset||-5};
    saveCharts([m]); setDefaultChartId(m.id); localStorage.removeItem('natal-birth');
  }
}

  try {
    // Wire all buttons

    });

      btn.addEventListener('click', () => {
        const page = btn.getAttribute('data-page');
        goPage(page, true);
        if (page === 'home') initHome();
        else if (page === 'charts') renderChartsList();
        else if (page === 'settings') renderSettings();
        else if (page === 'sky') initSky();
        else if (page === 'moon') initMoon();
        else if (page === 'astro') initAstro();
      });
    });
    document.getElementById('addChartBtn').addEventListener('click', newChartForm);

    // Event delegation for chart list buttons

      if (btn.dataset.viewId) viewChart(btn.dataset.viewId);

    document.getElementById('skyModalClose').addEventListener('click', closeSkyModal);
    document.getElementById('skySourceBtn').addEventListener('click', function() {
      document.getElementById('skySourcePanel').classList.toggle('open');
    });
    document.getElementById('horoSourceBtn').addEventListener('click', function() {
      document.getElementById('horoSourcePanel').classList.toggle('open');
    });
    document.getElementById('detailSourceBtn').addEventListener('click', function() {
      document.getElementById('detailSourcePanel').classList.toggle('open');
    });
    document.getElementById('moonSourceBtn').addEventListener('click', function() {
      document.getElementById('moonSourcePanel').classList.toggle('open');
    });
    document.getElementById('astroPlanetInfoBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('astroLinePopover').classList.remove('open');
      showAstroPlanetInfo(this);
    });
    document.getElementById('astroLineInfoBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('astroPlanetPopover').classList.remove('open');
      showAstroLineInfo(this);
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('#astroPlanetInfoBtn')) document.getElementById('astroPlanetPopover').classList.remove('open');
      if (!e.target.closest('#astroLineInfoBtn')) document.getElementById('astroLinePopover').classList.remove('open');
    });
    document.getElementById('astroModalClose').addEventListener('click', function() {
      document.getElementById('astroModalOverlay').classList.remove('open');
    });
    document.getElementById('astroModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
    document.getElementById('astroSearchBtn').addEventListener('click', searchAstroLocation);
    document.getElementById('astroSearchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchAstroLocation();
    });
    document.getElementById('astroSearchClearBtn').addEventListener('click', function() {

      document.getElementById('astroSearchResult').innerHTML = '';
      const existing = document.getElementById('astroLocationMarker');
      if (existing) existing.remove();
    });
    document.getElementById('skyModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeSkyModal();
    });
    document.getElementById('clearCacheBtn').addEventListener('click', clearAllCache);

    }
  } catch(e) {
    document.body.innerHTML += '<div style="padding:2rem;color:#c00;font-family:monospace;font-size:12px;">Boot error: ' + e.message + '<br>' + e.stack + '</div>';
  }
});
