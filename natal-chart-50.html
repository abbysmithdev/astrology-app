<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natal Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e8dcc8; --surface: #f0e8d6; --sand: #d4c4a8;
  --line: #c0b090; --ink: #c4622d; --ink-dark: #2e2416;
  --muted: #8a7a60; --orange: #c4622d; --orange2: #a04e22; --cream: #faf5ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink-dark); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
h2 { font-family: 'Cinzel', serif; font-weight: 400; letter-spacing: 0.06em; }
.app { width: 100%; }
.topbar { max-width: 520px; margin: 0 auto; }
.page { width: 100%; }
.page-inner { max-width: 520px; margin: 0 auto; padding: 0 1.4rem 3rem; }
#page-sky .sky-inner { max-width: 860px; margin: 0 auto; width: 100%; box-sizing: border-box; overflow-x: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.4rem 0.8rem; position: relative; }
.topbar-title { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
.back-btn { background: none; border: none; cursor: pointer; padding: 0.2rem 0.6rem 0.2rem 0; color: var(--muted); font-size: 1.2rem; line-height: 1; display: none; transition: color 0.12s; }
.back-btn:hover { color: var(--orange); }
.back-btn.visible { display: block; }
.menu-btn { background: none; border: none; cursor: pointer; padding: 0.2rem; color: var(--orange); opacity: 0.8; transition: opacity 0.15s; margin-left: auto; }
.menu-btn:hover { opacity: 1; }
.page { display: none; }
.page.active { display: block; }
.home-date { text-align: center; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 0.4rem 0 0.3rem; }
.active-chart-name { text-align: center; font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--orange); letter-spacing: 0.08em; margin-bottom: 1.4rem; }
.section-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; margin-top: 1.6rem; }
.horoscope-body { font-size: 0.92rem; line-height: 1.82; color: var(--ink-dark); font-weight: 300; }
.horoscope-body.loading { color: var(--muted); font-style: italic; }
.horoscope-error { font-size: 0.85rem; color: var(--orange2); }
.chart-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.chart-table th { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0 0.5rem; border-bottom: 1px solid var(--line); font-weight: 400; }
.chart-table th:nth-child(3) { text-align: right; padding-right: 0.6rem; }
.chart-table th:nth-child(4) { padding-left: 0.4rem; }
.chart-table td { padding: 0.5rem 0; border-bottom: 1px solid var(--sand); color: var(--ink-dark); vertical-align: middle; }
.chart-table td:first-child { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.06em; width: 90px; }
.chart-table td:nth-child(2) { font-weight: 500; }
.chart-table td:nth-child(3) { color: var(--muted); font-size: 0.82rem; text-align: right; padding-right: 0.6rem; }
.chart-table td:nth-child(4) { color: var(--orange); font-size: 0.75rem; text-align: left; padding-left: 0.4rem; min-width: 36px; }
.chart-table tr.angle-row td:first-child { color: var(--orange); }
.chart-table tr.angle-row td:nth-child(2) { color: var(--orange); }
.chart-table tbody tr { cursor: pointer; transition: background 0.1s; }
.chart-table tbody tr:hover { background: rgba(196,98,45,0.08); }
.chart-table-empty { padding: 2rem 0; color: var(--muted); font-size: 0.85rem; }
.detail-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--orange); font-weight: 400; letter-spacing: 0.06em; margin: 0.4rem 0 0.3rem; }
.detail-sub { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.4rem; }
.detail-body { font-size: 0.93rem; line-height: 1.82; color: var(--ink-dark); font-weight: 300; }
.detail-body.loading { color: var(--muted); font-style: italic; }
.detail-section { margin-bottom: 1.6rem; }
.detail-section-heading { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 0.6rem; }
.detail-section-text { font-size: 0.93rem; line-height: 1.82; color: var(--ink-dark); font-weight: 300; }
.page-header { margin: 0.4rem 0 1.4rem; }
.page-header h2 { font-size: 1.05rem; color: var(--ink-dark); }
.page-header p { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
.chart-list-item { background: var(--cream); border: 1px solid var(--line); padding: 0.9rem 1rem; margin-bottom: 0.6rem; display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; }
.chart-list-item.is-default { border-color: var(--orange); }
.cli-name { font-size: 0.92rem; color: var(--ink-dark); font-weight: 500; }
.cli-meta { font-size: 0.74rem; color: var(--muted); margin-top: 0.2rem; }
.default-badge { font-size: 0.62rem; background: var(--orange); color: #fff; padding: 0.1rem 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 0.4rem; vertical-align: middle; }
.cli-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
.cli-btn { background: none; border: 1px solid var(--line); color: var(--muted); padding: 0.3rem 0.6rem; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: border-color 0.12s, color 0.12s; white-space: nowrap; }
.cli-btn:hover { border-color: var(--orange); color: var(--orange); }
.cli-btn-del:hover { border-color: #c06060; color: #c06060; }
.cli-btn-view { border-color: var(--orange); color: var(--orange); }
.cli-btn-view:hover { background: var(--orange); color: #fff; }
.charts-empty { padding: 2rem 0; color: var(--muted); font-size: 0.85rem; }
.add-chart-btn { width: 100%; margin-top: 0.4rem; }
.field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; }
.field label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.field input, .field select { background: var(--cream); border: none; border-bottom: 1px solid var(--line); color: var(--ink-dark); padding: 0.5rem 0; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; width: 100%; appearance: none; -webkit-appearance: none; border-radius: 0; }
.field input:focus, .field select:focus { outline: none; border-bottom-color: var(--orange); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.geocode-status { font-size: 0.72rem; color: var(--muted); margin-top: -0.6rem; margin-bottom: 0.8rem; min-height: 1rem; }
.geocode-status.error { color: var(--orange2); }
.save-status { text-align: center; font-size: 0.75rem; color: var(--orange); letter-spacing: 0.1em; margin-top: 0.5rem; height: 1rem; }
.settings-group { margin-bottom: 1.6rem; }
.settings-group-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--line); }
.btn { background: var(--orange); color: #fff; border: none; padding: 0.75rem 2rem; font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.15s; width: 100%; margin-top: 0.4rem; }
.btn:hover { background: var(--orange2); }
.divider { border: none; border-top: 1px solid var(--line); margin: 1.4rem 0; }
/* ASTROCARTOGRAPHY PAGE */
#page-astro { padding: 0 !important; max-width: 100vw; width: 100%; }
.astro-inner { max-width: 1000px; margin: 0 auto; padding: 0 0 3rem; }
.astro-controls { padding: 0.8rem 1rem 0.5rem; }
.astro-planet-toggles { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.astro-toggle { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; border-radius: 20px; border: 1.5px solid; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s, background 0.15s; background: transparent; letter-spacing: 0.03em; }
.astro-toggle.off { opacity: 0.3; }
.astro-toggle-dot { width: 7px; height: 7px; border-radius: 50%; }
.astro-map-wrap { width: 100%; overflow: hidden; }
#astroMap { width: 100%; height: auto; display: block; cursor: crosshair; }
.astro-line { stroke-width: 0.6; fill: none; opacity: 0.75; cursor: pointer; transition: opacity 0.1s; }
.astro-line:hover { opacity: 1; }
@media (max-width: 600px) { .astro-line { stroke-width: 0.4; opacity: 0.65; } }
.astro-line.ac { stroke-dasharray: none; }          /* Rising: solid */
.astro-line.dc { stroke-dasharray: 3 3; }          /* Setting: evenly dashed */
.astro-line.mc { stroke-dasharray: 8 3; }          /* Midheaven: long dash */
.astro-line.ic { stroke-dasharray: 1 4; }          /* Nadir: dotted */
.astro-search-wrap { display: flex; gap: 0.5rem; padding: 0.8rem 1rem 0; padding-right: 1rem; box-sizing: border-box; width: 100%; }
.astro-search-input { flex: 1; padding: 0.5rem 0.8rem; border: 1px solid var(--line); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink-dark); border-radius: 4px; outline: none; }
.astro-search-input:focus { border-color: var(--orange); }
.astro-search-btn { padding: 0.5rem 1rem; background: var(--orange); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; border-radius: 4px; white-space: nowrap; }
.astro-search-result { padding: 0.8rem 1rem 0; font-size: 0.88rem; line-height: 1.7; color: var(--ink-dark); }
.astro-result-line { margin-bottom: 0.5rem; padding: 0.6rem 0.8rem; border-left: 3px solid; border-radius: 0 4px 4px 0; background: rgba(255,255,255,0.3); }
.astro-result-title { font-weight: 500; margin-bottom: 0.2rem; font-size: 0.85rem; }
.astro-result-desc { font-size: 0.8rem; color: var(--muted); }
.astro-no-result { color: var(--muted); font-style: italic; padding: 0.5rem 1rem; }
.astro-boost-wrap { padding: 0.4rem 1rem 0; position: relative; display: inline-block; }
.astro-boost-heart { background: none; border: none; cursor: pointer; color: var(--muted); opacity: 0.55; transition: opacity 0.15s, color 0.15s; padding: 0; line-height: 1; }
.astro-boost-heart:hover { opacity: 1; color: var(--orange); }
.astro-boost-heart.active { opacity: 1; color: var(--orange); }
.astro-boost-panel { display: none; position: absolute; left: 0; top: calc(100% + 6px); z-index: 200; min-width: 280px; max-width: 340px; padding: 1rem; border: 1px solid var(--line); border-radius: 8px; background: var(--cream); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.astro-boost-panel.open { display: block; }
.astro-boost-header { font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.1em; color: var(--orange); margin-bottom: 0.7rem; }
.astro-boost-keywords { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
.astro-boost-keyword { background: none; border: 1.5px solid var(--line); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; padding: 0.25rem 0.7rem; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
.astro-boost-keyword.active { color: #fff; border-color: transparent; }
.astro-boost-actions { display: flex; justify-content: flex-end; }
.astro-boost-clear { background: none; border: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0; }
.astro-boost-clear:hover { color: var(--ink-dark); }
.astro-city-dot { cursor: pointer; }
.astro-city-dot:hover circle { r: 5; }
.astro-city-tip { position: fixed; z-index: 400; background: var(--cream); border: 1px solid var(--line); border-radius: 4px; padding: 0.4rem 0.7rem; font-size: 0.75rem; font-family: 'DM Sans', sans-serif; color: var(--ink-dark); pointer-events: none; display: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.astro-zoom-controls { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 10; }
.astro-zoom-btn { background: var(--cream); border: 1px solid var(--line); color: var(--ink-dark); width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 1rem; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; transition: background 0.1s; }
.astro-zoom-btn:hover { background: var(--sand); }
.astro-zoom-slider { -webkit-appearance: slider-vertical; writing-mode: vertical-lr; direction: rtl; width: 26px; height: 80px; cursor: pointer; accent-color: var(--orange); }
@media (max-width: 600px) { .astro-zoom-slider { display: none; } }
.astro-line-label { font-family: 'DM Sans', sans-serif; font-size: 8px; fill: currentColor; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.astro-line-label.visible { opacity: 0.85; }
#astroMap { user-select: none; -webkit-user-select: none; }
.astro-line-toggle { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.7rem; border-radius: 20px; border: 1.5px solid var(--line); font-size: 0.72rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s; background: transparent; color: var(--muted); letter-spacing: 0.03em; }
.astro-line-toggle.off { opacity: 0.3; }
.astro-line-toggle-dash { width: 16px; height: 2px; flex-shrink: 0; }
.astro-legend { display: flex; flex-wrap: wrap; gap: 1rem; padding: 0.6rem 1rem; font-size: 0.72rem; color: var(--muted); }
.astro-legend-item { display: flex; align-items: center; gap: 0.4rem; }
.astro-planet-info-btn { background: none; border: none; cursor: pointer; padding: 0; line-height: 1; color: inherit; opacity: 0.55; transition: opacity 0.15s; vertical-align: middle; margin-left: 2px; }
.astro-planet-info-btn:hover { opacity: 1; }
.astro-popover { position: fixed; z-index: 300; background: var(--cream); border: 1px solid var(--line); border-radius: 6px; padding: 0.8rem; width: 220px; max-height: 70vh; overflow-y: auto; font-size: 0.78rem; line-height: 1.5; color: var(--ink-dark); box-shadow: 0 4px 20px rgba(0,0,0,0.14); display: none; }
.astro-popover.open { display: block; }
.astro-popover-planet { margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--sand); }
.astro-popover-planet:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.astro-popover-planet-name { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
.astro-popover-planet-desc { color: var(--muted); font-size: 0.75rem; line-height: 1.55; }

/* MOON PAGE */
.moon-phase-wrap { display: flex; justify-content: center; margin: 1.8rem 0 1.2rem; }
.moon-phase-name { text-align: center; font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--orange); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
.moon-phase-sign { text-align: center; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.8rem; }
.moon-general { font-size: 0.92rem; line-height: 1.8; color: var(--ink-dark); font-weight: 300; }
.moon-personal { font-size: 0.92rem; line-height: 1.8; color: var(--ink-dark); font-weight: 300; }
.moon-general.loading, .moon-personal.loading { color: var(--muted); font-style: italic; }

/* SKY TABLE */
.sky-page-date { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
#page-sky .sky-inner { padding: 0.2rem 1.4rem 3rem; }
.sky-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 0.5rem; }
.sky-table th { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0.8rem 0.5rem 0; border-bottom: 1px solid var(--line); font-weight: 400; }
.sky-table td { padding: 0.5rem 0.8rem 0.5rem 0; border-bottom: 1px solid var(--sand); color: var(--ink-dark); vertical-align: top; font-size: 0.88rem; }
.sky-table td:first-child { color: var(--muted); font-size: 0.78rem; white-space: nowrap; width: 75px; }
.sky-table td:nth-child(2) { font-weight: 500; white-space: nowrap; width: 100px; }
.sky-table td:nth-child(3) { white-space: nowrap; width: 55px; }
.sky-table td .retro-badge { font-size: 0.65rem; color: var(--orange); margin-left: 0.3rem; letter-spacing: 0.05em; }
.sky-table tbody tr { cursor: pointer; transition: background 0.1s; }
.sky-table tbody tr:hover { background: rgba(196,98,45,0.06); }
.sky-table td.sky-note { color: var(--muted); font-size: 0.75rem; font-style: italic; line-height: 1.5; white-space: normal; min-width: 0; }
@media (max-width: 480px) {
  .sky-table th:nth-child(4), .sky-table td:nth-child(4) { display: none; }
  .sky-table td:first-child { width: 65px; }
  .sky-table td:nth-child(2) { width: 85px; }
  .sky-table td:nth-child(3) { width: 45px; }
}

/* SKY MODAL */
.sky-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(46,36,22,0.3); z-index: 200; align-items: center; justify-content: center; }
.sky-modal-overlay.open { display: flex; }
.sky-modal { background: var(--cream); border: 1px solid var(--line); width: 90%; max-width: 620px; max-height: 75vh; overflow-y: auto; padding: 1.6rem 2rem 2rem; border-radius: 8px; }
.sky-modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.9rem; }
.sky-modal-title { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--orange); letter-spacing: 0.06em; flex: 1; }
.sky-modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0 0 0 1rem; line-height: 1; transition: color 0.12s; }
.sky-modal-close:hover { color: var(--ink-dark); }
.sky-modal-actions { display: flex; align-items: center; gap: 0.6rem; }
.sky-source-btn { background: none; border: none; cursor: pointer; padding: 0 0 0 0.2rem; opacity: 0.45; transition: opacity 0.15s; line-height: 1; }
.sky-source-btn:hover { opacity: 0.9; }
.source-btn { background: none; border: none; cursor: pointer; opacity: 0.4; transition: opacity 0.15s; padding: 0; line-height: 1; vertical-align: middle; margin-left: 0.5rem; color: var(--orange); }
.source-btn:hover { opacity: 0.9; }
.inline-source-panel { display: none; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--line); }
.inline-source-panel.open { display: block; }
.inline-source-item { font-size: 0.78rem; color: var(--muted); padding: 0.2rem 0; line-height: 1.5; }
.inline-source-item strong { color: var(--ink-dark); font-weight: 500; }
.sky-source-panel { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--line); }
.sky-source-panel.open { display: block; }
.sky-source-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.sky-source-item { font-size: 0.78rem; color: var(--muted); padding: 0.2rem 0; line-height: 1.5; }
.sky-source-item strong { color: var(--ink-dark); font-weight: 500; }
.sky-modal-body { font-size: 0.9rem; line-height: 1.8; color: var(--ink-dark); font-weight: 300; }
.sky-modal-body.loading { color: var(--muted); font-style: italic; }

.menu-overlay { display: none; position: fixed; inset: 0; background: rgba(46,36,22,0.18); z-index: 100; }
.menu-overlay.open { display: block; }
.menu-panel { position: absolute; top: 0; right: 0; width: 200px; height: 100%; background: var(--surface); border-left: 1px solid var(--line); padding: 2rem 1.4rem; display: flex; flex-direction: column; gap: 0.2rem; }
.menu-panel-title { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }
.menu-item { background: none; border: none; text-align: left; padding: 0.7rem 0; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink-dark); cursor: pointer; border-bottom: 1px solid var(--line); transition: color 0.12s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item.active { color: var(--orange); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()">&#8592;</button>
    <div class="topbar-title" id="pageTitle">Chart</div>
    <button class="menu-btn" id="menuBtn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <line x1="11" y1="2" x2="11" y2="7"/><line x1="11" y1="15" x2="11" y2="20"/>
        <line x1="2" y1="11" x2="7" y2="11"/><line x1="15" y1="11" x2="20" y2="11"/>
        <line x1="4.1" y1="4.1" x2="7.6" y2="7.6"/><line x1="14.4" y1="14.4" x2="17.9" y2="17.9"/>
        <line x1="17.9" y1="4.1" x2="14.4" y2="7.6"/><line x1="7.6" y1="14.4" x2="4.1" y2="17.9"/>
        <circle cx="11" cy="11" r="2.2"/>
      </svg>

// EPHEMERIS

function calcGMST(date) {
  const jd0 = Math.floor(date.getTime()/86400000 + 2440587.5 - 0.5) + 0.5;
  const T0 = (jd0 - 2451545.0) / 36525;
  let g = 24110.54841 + 8640184.812866*T0 + 0.093104*T0*T0 - 6.2e-6*T0*T0*T0;
  const uth = (date.getTime() / 3600000) % 24;
  return normDeg((g / 240) + uth * 15.04106858);
}

function calcObliquity(utcDate) {
  const jd = utcDate.getTime()/86400000 + 2440587.5;
  return 23.4393 - 0.013004 * ((jd - 2451545.0)/36525);
}

function calcASC(lst, lat, obl) {
  const r = toRad(lst), lr = toRad(lat), er = toRad(obl);
  let a = toDeg(Math.atan2(Math.cos(r), -(Math.sin(r)*Math.sin(er) + Math.tan(lr)*Math.cos(er))));
  if (a < 0) a += 360;
  if (lst > 180) a = (a + 180) % 360;
  return normDeg(a);
}

function calcMC(lst, obl) {
  const r = toRad(lst), er = toRad(obl);
  return normDeg(toDeg(Math.atan2(Math.sin(r), Math.cos(r)*Math.cos(er))));
}

// Lahiri ayanamsa (approximate, good to ~0.1 deg for modern era)
function lahiriAyanamsa(utcDate) {
  const jd = utcDate.getTime()/86400000 + 2440587.5;
  const T = (jd - 2451545.0) / 36525;
  return 23.85 + 0.013611 * T; // degrees
}

// Placidus house cusps - returns array of 12 cusp longitudes (houses 1-12)
function calcPlacidusHouses(lst, lat, obl) {
  const latR = toRad(lat), oblR = toRad(obl);
  const cusps = new Array(12);

  // House 10 (MC)
  const r = toRad(lst);
  cusps[9] = normDeg(toDeg(Math.atan2(Math.sin(r), Math.cos(r)*Math.cos(oblR))));

  // House 1 (ASC)
  let asc = toDeg(Math.atan2(Math.cos(r), -(Math.sin(r)*Math.sin(oblR)+Math.tan(latR)*Math.cos(oblR))));
  if (asc < 0) asc += 360;
  if (lst > 180) asc = (asc+180)%360;
  cusps[0] = normDeg(asc);

  // Opposite houses
  cusps[3] = normDeg(cusps[9] + 180); // IC
  cusps[6] = normDeg(cusps[0] + 180); // DSC

  // Intermediate houses via iterative Placidus
  function placidusInterp(offset, frac) {
    let lon = normDeg(lst + offset);
    for (let i = 0; i < 50; i++) {
      const lonR = toRad(lon);
      const dec = Math.asin(Math.sin(oblR)*Math.sin(lonR));
      const ad = Math.asin(Math.tan(latR)*Math.tan(dec));
      const ra = normDeg(toDeg(Math.atan2(Math.sin(lonR)*Math.cos(oblR), Math.cos(lonR))));
      const sda = 90 + toDeg(ad);
      const targetOA = normDeg(lst + offset);
      const newRA = normDeg(targetOA + toDeg(ad));
      const newLon = normDeg(toDeg(Math.atan2(Math.sin(toRad(newRA)), Math.cos(toRad(newRA))*Math.cos(oblR))));
      if (Math.abs(newLon - lon) < 0.001) { lon = newLon; break; }
      lon = newLon;
    }
    return normDeg(lon);
  }

  cusps[10] = placidusInterp(30, 1/3);  // House 11
  cusps[11] = placidusInterp(60, 2/3);  // House 12
  cusps[1]  = placidusInterp(120, 1/3); // House 2
  cusps[2]  = placidusInterp(150, 2/3); // House 3

  // Houses 4-9 are opposite 10-3
  for (let i = 0; i < 6; i++) {
    if (cusps[i+6] == null) cusps[i+6] = normDeg(cusps[i] + 180);
  }

  return cusps; // index 0 = house 1, index 11 = house 12
}

function calcWholeSignHouses(ascDeg) {
  const ascSign = Math.floor(normDeg(ascDeg) / 30);
  return Array.from({length:12}, (_, i) => normDeg((ascSign + i) * 30));
}

function calcEqualHouses(ascDeg) {
  return Array.from({length:12}, (_, i) => normDeg(ascDeg + i * 30));
}

function getPlanetHouse(planetLon, cusps) {
  // Find which house a planet falls in given 12 cusp longitudes
  for (let h = 0; h < 12; h++) {
    const next = (h + 1) % 12;
    const start = cusps[h];
    const end = cusps[next];
    let lon = normDeg(planetLon);
    if (start <= end) {
      if (lon >= start && lon < end) return h + 1;
    } else { // crosses 0°
      if (lon >= start || lon < end) return h + 1;
    }
  }
  return 1;
}

function calcChart(dateStr, timeStr, lat, lon, utcOffset, houseSystem, zodiacSystem) {
  const [yr, mo, dy] = dateStr.split('-').map(Number);
  const [hr, mn] = timeStr.split(':').map(Number);
  const utcMs = Date.UTC(yr, mo-1, dy) + (hr + mn/60 - utcOffset)*3600000;
  const utcDate = new Date(utcMs);

  // Ayanamsa: only applied for Vedic (sidereal). Tropical uses raw positions.
  const ayanamsa = zodiacSystem === 'sidereal' ? lahiriAyanamsa(utcDate) : 0;

  // Raw tropical positions (always used for house assignment)
  const rawPos = {};
  rawPos.Sun = normDeg(Astronomy.SunPosition(utcDate).elon);
  rawPos.Moon = normDeg(Astronomy.EclipticGeoMoon(utcDate).lon);
  for (const b of ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto']) {
    try {
      const geo = Astronomy.GeoVector(b, utcDate, true);
      rawPos[b] = normDeg(Astronomy.Ecliptic(geo).elon);
    } catch(e) { rawPos[b] = null; }
  }
  const obl = calcObliquity(utcDate);
  const gmst = calcGMST(utcDate);
  const lst = normDeg(gmst + lon);
  rawPos.ASC = calcASC(lst, lat, obl);
  rawPos.MC = calcMC(lst, obl);

  // Display positions:
  // tropical: use raw positions (ayanamsa = 0)
  // sidereal: subtract ayanamsa from everything
  const pos = {};
  for (const p of Object.keys(rawPos)) {
    pos[p] = rawPos[p] != null ? normDeg(rawPos[p] - ayanamsa) : null;
  }

  // House cusps: always anchored to tropical ASC
  let cusps;
  if (houseSystem === 'whole') {
    cusps = calcWholeSignHouses(rawPos.ASC);
  } else if (houseSystem === 'equal') {
    cusps = calcEqualHouses(rawPos.ASC);
  } else {
    cusps = calcPlacidusHouses(lst, lat, obl);
  }

  // House assignment: always use tropical positions
  const houses = {};
  for (const p of PLANET_ORDER.filter(p => !['ASC','MC'].includes(p))) {
    if (rawPos[p] != null) houses[p] = getPlanetHouse(rawPos[p], cusps);
  }
  houses.ASC = 1;
  houses.MC = getPlanetHouse(rawPos.MC, cusps);

  return { pos, houses };
}

function renderDetailSections(el, text) {
  // Parse the text into sections based on the three known headings
  // Headings are lines that don't start with a lowercase letter and are short
  el.className = 'detail-body';
  el.innerHTML = '';

  const lines = text.trim().split('\n');
  let currentHeading = null;
  let currentLines = [];

  function flushSection() {
    if (!currentHeading && currentLines.length === 0) return;
    const section = document.createElement('div');
    section.className = 'detail-section';
    if (currentHeading) {
      const h = document.createElement('div');
      h.className = 'detail-section-heading';
      h.textContent = currentHeading;
      section.appendChild(h);
    }
    const body = currentLines.join('\n').trim();
    if (body) {
      const p = document.createElement('div');
      p.className = 'detail-section-text';
      p.textContent = body;
      section.appendChild(p);
    }
    if (section.children.length > 0) el.appendChild(section);
  }

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Detect a heading: short line (under 80 chars), doesn't start with lowercase,
    // and isn't a sentence (no period mid-line)
    const isHeading = trimmed.length < 80
      && !/^[a-z]/.test(trimmed)
      && !/[.!?]/.test(trimmed.slice(0, -1));
    if (isHeading && trimmed.length > 3) {
      flushSection();
      currentHeading = trimmed;
      currentLines = [];
    } else {
      currentLines.push(trimmed);
    }
  }
  flushSection();

  // If parsing produced nothing useful, fall back to plain text
  if (el.children.length === 0) {
    el.textContent = text;
  }
}

function getTransitData(planetKey) {
  // Returns {sign, house} for the current transiting position of a planet
  const now = new Date();
  try {
    let lon;
    if (planetKey === 'Sun') {
      lon = normDeg(Astronomy.SunPosition(now).elon);
    } else if (planetKey === 'Moon') {
      lon = normDeg(Astronomy.EclipticGeoMoon(now).lon);
    } else {
      const geo = Astronomy.GeoVector(planetKey, now, true);
      lon = normDeg(Astronomy.Ecliptic(geo).elon);
    }
    const sign = SIGNS[Math.floor(lon / 30)];

    // Calculate which natal house the transiting planet falls in
    let house = null;
    if (currentChartData) {
      const chart = getActiveChart();
      const settings = getSettings();
      if (chart) {
        try {
          const {houses: natalHouses, pos: natalPos} = currentChartData;
          // Use natal ASC to build whole sign cusps (or whatever house system is set)
          const ascLon = Object.keys(natalPos).includes('ASC') ? natalPos.ASC : null;
          if (ascLon != null) {
            // For transit house, always use whole sign from natal ASC for simplicity
            const tropAscLon = normDeg(ascLon);
            const ascSign = Math.floor(normDeg(tropAscLon) / 30);
            const transitSignIdx = Math.floor(lon / 30);
            house = ((transitSignIdx - ascSign + 12) % 12) + 1;
          }
        } catch(_) {}
      }
    }
    return {sign, house};
  } catch(e) { return {sign: null, house: null}; }
}

    '',

    const s = getSign(positions[p]); return PLANET_NAMES[p] + ': ' + s.sign + ' ' + s.degree.toFixed(1) + '\u00b0';
  }).join('\n');

    ? '\n\nKey aspects today:\n' + aspectLines.slice(0, 6).join('\n')

    '\n\nWrite a horoscope of around 150 words. Rules:\n' +
    '- Address the reader as "you" throughout. Do not use their name.\n' +
    '- No em dashes, no en dashes\n' +
    '- No AI writing cliches. Banned phrases and patterns: "delve", "tapestry", "navigate", "it is worth noting", "in the realm of", "at its core", "this is not X it is Y", rhetorical questions answered immediately, any sentence that pivots with "and yet"\n' +
    '- No cosmic fluff. No "the universe is asking you to". No "lean into". No "embrace"\n' +
    '- Tone: observational, a little dry, specific. Like someone who actually knows what they are talking about and does not need to oversell it\n' +
    '- Focus on the key aspects listed. Describe what the planetary energy actually feels like in practical, human terms\n' +
    '- One flowing paragraph. Plain text only. No markdown, no headers, no asterisks, no hyphens used as dashes.';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:400, messages:[{role:'user',content:prompt}]})
    });
    if (!resp.ok) {
      const e = await resp.json();
      throw new Error(e.error?.message || 'API error ' + resp.status);
    }
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    if (!text) throw new Error('Empty response');
    el.className = 'horoscope-body';
    el.textContent = text;
    try { buildHoroSource(); } catch(_) {}
    try {
      localStorage.setItem(cacheKey, text);
      for (const k of Object.keys(localStorage)) {
        if (k.startsWith('natal-horoscope-') && k !== cacheKey) localStorage.removeItem(k);
      }
    } catch(_) {}
  } catch(e) {
    el.className = 'horoscope-error';
    el.textContent = 'Error: ' + e.message;
    console.error('fetchHoroscope error:', e);
  }
}

async function saveChartEdit() {
  const name = document.getElementById('editName').value.trim();
  const dateStr = document.getElementById('editDate').value;
  const timeStr = document.getElementById('editTime').value;
  const city = document.getElementById('editCity').value.trim();
  const region = document.getElementById('editRegion').value.trim();
  const utcOffset = parseFloat(document.getElementById('editUtcOffset').value);
  const geoEl = document.getElementById('editGeoStatus');
  const saveEl = document.getElementById('editSaveStatus');
  if (!name || !dateStr || !timeStr || !city || !region) { saveEl.textContent = 'Fill in all fields.'; return; }
  geoEl.className = 'geocode-status'; geoEl.textContent = 'Looking up...'; saveEl.textContent = '';
  try {
    const geo = await geocodeCity(city, region);
    geoEl.textContent = geo.display;
    const charts = getCharts();
    if (editingChartId) {
      const idx = charts.findIndex(c => c.id === editingChartId);
      if (idx >= 0) charts[idx] = {...charts[idx], name, dateStr, timeStr, lat:geo.lat, lon:geo.lon, city, region, utcOffset};
    } else {
      const nc = {id:genId(), name, dateStr, timeStr, lat:geo.lat, lon:geo.lon, city, region, utcOffset};
      charts.push(nc);
      if (charts.length === 1) setDefaultChartId(nc.id);
    }
    saveCharts(charts);
    saveEl.textContent = 'Saved.';
    setTimeout(() => { goPage('charts', false); renderChartsList(); }, 600);
  } catch(e) {
    geoEl.className = 'geocode-status error';
    geoEl.textContent = 'Location not found. Try a nearby city.';
  }
}
async function geocodeCity(city, region) {
  const q = encodeURIComponent(city + ', ' + region);
  const resp = await fetch('https://nominatim.openstreetmap.org/search?q=' + q + '&format=json&limit=1', {headers:{'Accept-Language':'en'}});
  const r = await resp.json();
  if (!r.length) throw new Error('Not found');
  return {lat:parseFloat(r[0].lat), lon:parseFloat(r[0].lon), display:r[0].display_name.split(',').slice(0,2).join(',')};
}

  Pluto:   'Pluto lines bring transformation and intensity. Places where deep change is possible — but rarely comfortable.',
};

let astroLineData = []; // computed line points for proximity search
let activePlanets = new Set(Object.keys(PLANET_COLORS));

function getAstroData() {
  const chart = getActiveChart();
  if (!chart) return null;

  const birthDate = new Date(chart.dateStr + 'T' + chart.timeStr + ':00');
  // Apply UTC offset
  const utcDate = new Date(birthDate.getTime() - chart.utcOffset * 60000);

  const jd = utcDate.getTime()/86400000 + 2440587.5;
  const T = (jd - 2451545.0)/36525;
  const oblDeg = 23.4393 - 0.013004*T;
  const obl = oblDeg * Math.PI / 180;

  function normDeg(d) { return ((d%360)+360)%360; }
  function toRad(d) { return d * Math.PI / 180; }
  function toDeg(r) { return r * 180 / Math.PI; }

  // GMST
  function calcGMST(date) {
    const jd0 = Math.floor(date.getTime()/86400000 + 2440587.5 - 0.5) + 0.5;
    const T0 = (jd0 - 2451545.0) / 36525;
    let g = 24110.54841 + 8640184.812866*T0 + 0.093104*T0*T0 - 6.2e-6*T0*T0*T0;
    const uth = (date.getTime() / 3600000) % 24;
    return normDeg((g / 240) + uth * 15.04106858);
  }
  const gmst = calcGMST(utcDate);

  function getPlanetRADec(body) {
    let lon;
    try {
      if (body === 'Sun') lon = normDeg(Astronomy.SunPosition(utcDate).elon);
      else if (body === 'Moon') lon = normDeg(Astronomy.EclipticGeoMoon(utcDate).lon);
      else { const geo = Astronomy.GeoVector(body, utcDate, true); lon = normDeg(Astronomy.Ecliptic(geo).elon); }
    } catch(e) { return null; }
    const lonR = toRad(lon);
    const ra = normDeg(toDeg(Math.atan2(Math.sin(lonR)*Math.cos(obl), Math.cos(lonR))));
    const dec = toDeg(Math.asin(Math.sin(obl)*Math.sin(lonR)));
    return {ra, dec};
  }

  const lines = [];
  for (const planet of Object.keys(PLANET_COLORS)) {
    const rd = getPlanetRADec(planet);
    if (!rd) continue;
    const {ra, dec} = rd;
    const decR = toRad(dec);

    // MC line: vertical at mcLon
    let mcLon = ra - gmst;
    while (mcLon > 180) mcLon -= 360;
    while (mcLon < -180) mcLon += 360;
    let icLon = mcLon + (mcLon > 0 ? -180 : 180);

    lines.push({planet, type:'mc', lon: mcLon, points: null});
    lines.push({planet, type:'ic', lon: icLon, points: null});

    // AC/DC: curved lines
    const acPts = [], dcPts = [];
    for (let latDeg = -80; latDeg <= 80; latDeg += 2) {
      const latR = toRad(latDeg);
      const cosH = -Math.tan(latR) * Math.tan(decR);
      if (Math.abs(cosH) > 1) continue;
      const H = toDeg(Math.acos(cosH));

      let acLon = ra - H - gmst;
      while (acLon > 180) acLon -= 360;
      while (acLon < -180) acLon += 360;

      let dcLon = ra + H - gmst;
      while (dcLon > 180) dcLon -= 360;
      while (dcLon < -180) dcLon += 360;

      acPts.push([acLon, latDeg]);
      dcPts.push([dcLon, latDeg]);
    }
    lines.push({planet, type:'ac', points: acPts});
    lines.push({planet, type:'dc', points: dcPts});
  }
  return {lines, gmst};
}

// Map projection helpers (defined above)

function buildAstroLines(lines) {
  const ns = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('astroLines');
  g.innerHTML = '';
  astroLineData = [];

  for (const line of lines) {
    const color = PLANET_COLORS[line.planet];
    const visible = activePlanets.has(line.planet);

    if (line.type === 'mc' || line.type === 'ic') {
      // Vertical line
      const x = lonToX(line.lon);
      const el = document.createElementNS(ns, 'line');
      el.setAttribute('x1', x); el.setAttribute('y1', 0);
      el.setAttribute('x2', x); el.setAttribute('y2', MAP_H);
      el.setAttribute('stroke', color);
      el.setAttribute('stroke-width', '0.6');
      el.setAttribute('vector-effect', 'non-scaling-stroke');
      el.setAttribute('class', 'astro-line ' + line.type);
      el.setAttribute('data-planet', line.planet);
      el.setAttribute('data-type', line.type);
      el.style.display = (visible && activeLineTypes.has(line.type)) ? '' : 'none';
      el.addEventListener('click', () => openAstroModal(line.planet, line.type));
      g.appendChild(el);

      // Store for proximity search
      astroLineData.push({
        planet: line.planet, type: line.type,
        getClosestPoint: (qLon, qLat) => {
          // Closest point on vertical line is same lat, lon=line.lon
          return {lon: line.lon, lat: qLat};
        }
      });

    } else {
      // Curved AC/DC line — draw as polyline, split at 180/-180 boundary
      const pts = line.points;
      if (!pts || pts.length < 2) continue;

      let segment = [];
      const segments = [];
      for (let i = 0; i < pts.length; i++) {
        if (i > 0) {
          const prev = pts[i-1][0], curr = pts[i][0];
          if (Math.abs(curr - prev) > 90) { // crossed antimeridian
            segments.push(segment);
            segment = [];
          }
        }
        segment.push(pts[i]);
      }
      segments.push(segment);

      for (const seg of segments) {
        if (seg.length < 2) continue;
        const polyPts = seg.map(([lon, lat]) => lonToX(lon) + ',' + latToY(lat)).join(' ');
        const el = document.createElementNS(ns, 'polyline');
        el.setAttribute('points', polyPts);
        el.setAttribute('stroke', color);
        el.setAttribute('stroke-width', '0.6');
        el.setAttribute('vector-effect', 'non-scaling-stroke');
        el.setAttribute('class', 'astro-line ' + line.type);
        el.setAttribute('data-planet', line.planet);
        el.setAttribute('data-type', line.type);
        el.style.display = (visible && activeLineTypes.has(line.type)) ? '' : 'none';
        el.addEventListener('click', () => openAstroModal(line.planet, line.type));
        g.appendChild(el);
      }

      // Store for proximity
      astroLineData.push({
        planet: line.planet, type: line.type, points: pts,
        getClosestPoint: (qLon, qLat) => {
          let best = null, bestDist = Infinity;
          for (const [lon, lat] of pts) {
            const d = Math.hypot(lon - qLon, (lat - qLat) * 1.5);
            if (d < bestDist) { bestDist = d; best = {lon, lat}; }
          }
          return best;
        }
      });
    }
  }
  buildLineLabels(lines);
}

// buildLineLabels called from buildAstroLines
// Store line geometry for dynamic label positioning
let astroLinesGeometry = [];

function buildLineLabels(lines) {
  // Store geometry for repositioning on zoom/pan
  astroLinesGeometry = lines.map(line => ({
    planet: line.planet,
    type: line.type,
    lon: line.lon || null,
    points: line.points || null,
  }));
  updateLineLabels();
}

function updateLineLabels() {
  const ns = 'http://www.w3.org/2000/svg';
  const labelG = document.getElementById('astroLabels');
  if (!labelG) return;
  labelG.innerHTML = '';

  const z = mapState.zoom;
  if (z < LABEL_ZOOM_THRESHOLD) return;

  const vx0 = mapState.panX, vy0 = mapState.panY;
  const vw = MAP_W / z, vh = MAP_H / z;
  const vx1 = vx0 + vw, vy1 = vy0 + vh;
  // Fixed 11px on screen regardless of zoom level
  const fontSize = 11 / z;

  // Track occupied y-positions for vertical lines to prevent overlap
  // Key: Math.round(x/20)*20 bucket, value: array of y positions used
  const usedVertical = {}; // x-bucket -> [y values]
  // Track occupied positions for curved lines
  const usedCurved = []; // [{cx, cy, angle}] — check proximity before placing

  for (const line of astroLinesGeometry) {
    if (!activePlanets.has(line.planet) || !activeLineTypes.has(line.type)) continue;
    const color = PLANET_COLORS[line.planet];

    if (line.type === 'mc' || line.type === 'ic') {
      const x = lonToX(line.lon);
      if (x < vx0 - 5 || x > vx1 + 5) continue;

      // Find a y position that doesn't overlap other labels on nearby vertical lines
      const xBucket = Math.round(x / 15) * 15;
      if (!usedVertical[xBucket]) usedVertical[xBucket] = [];

      // Try multiple y positions across the viewport
      const candidates = [0.2, 0.4, 0.6, 0.75].map(f => vy0 + vh * f);
      let chosenY = candidates[0];
      for (const cy of candidates) {
        const tooClose = usedVertical[xBucket].some(uy => Math.abs(uy - cy) < vh * 0.12);
        if (!tooClose) { chosenY = cy; break; }
      }
      usedVertical[xBucket].push(chosenY);

      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', x + 8 / z);
      text.setAttribute('y', chosenY);
      text.setAttribute('fill', color);
      text.setAttribute('font-size', fontSize);
      text.setAttribute('font-family', 'DM Sans, sans-serif');
      text.setAttribute('writing-mode', 'tb');
      text.setAttribute('letter-spacing', '0.5');
      text.setAttribute('opacity', '0.8');
      text.textContent = line.planet.toLowerCase();
      labelG.appendChild(text);

    } else if (line.points && line.points.length > 2) {
      const visible = line.points.filter(([lon, lat]) => {
        const x = lonToX(lon), y = latToY(lat);
        return x >= vx0 && x <= vx1 && y >= vy0 && y <= vy1;
      });
      if (visible.length < 2) continue;

      // Find midpoint of visible segment
      const midIdx = Math.floor(visible.length / 2);
      const mid = visible[midIdx];
      const prev = visible[Math.max(0, midIdx - 1)];
      const mx = lonToX(mid[0]), my = latToY(mid[1]);
      const px = lonToX(prev[0]), py = latToY(prev[1]);
      const angle = Math.atan2(my - py, mx - px) * 180 / Math.PI;

      // Check if too close to an existing curved label
      const minDist = vw * 0.08; // minimum separation in map units
      const tooClose = usedCurved.some(u => {
        return Math.hypot(u.cx - mx, u.cy - my) < minDist;
      });
      if (tooClose) continue;
      usedCurved.push({cx: mx, cy: my, angle});

      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', mx);
      text.setAttribute('y', my - 8 / z);
      text.setAttribute('fill', color);
      text.setAttribute('font-size', fontSize);
      text.setAttribute('font-family', 'DM Sans, sans-serif');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('opacity', '0.8');
      text.setAttribute('transform', 'rotate(' + angle + ' ' + mx + ' ' + my + ')');
      text.textContent = line.planet.toLowerCase();
      labelG.appendChild(text);
    }
  }
}

// Great circle distance in miles
function gcDist(lat1, lon1, lat2, lon2) {
  const R = 3959;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function runProximitySearch(qLon, qLat, cityName) {
  const resultEl = document.getElementById('astroSearchResult');
  const THRESHOLD = 500;
  const nearby = [];

  for (const lineData of astroLineData) {
    const closest = lineData.getClosestPoint(qLon, qLat);
    if (!closest) continue;
    const dist = gcDist(qLat, qLon, closest.lat, closest.lon);
    if (dist <= THRESHOLD) nearby.push({...lineData, dist: Math.round(dist), closest});
  }

  nearby.sort((a, b) => a.dist - b.dist);

  if (!nearby.length) {
    resultEl.innerHTML = '<div class="astro-no-result">' + cityName + ' is not near any of your lines within ' + THRESHOLD + ' miles.</div>';
    return;
  }

  const seen = new Set();
  const unique = nearby.filter(n => {
    const key = n.planet + '-' + n.type;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  let h = '<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.6rem">Lines within ' + THRESHOLD + ' miles:</div>';
  for (const n of unique.slice(0, 6)) {
    const color = PLANET_COLORS[n.planet];
    const typeName = LINE_TYPE_NAMES[n.type];
    h += '<div class="astro-result-line" style="border-color:' + color + '">' +
      '<div class="astro-result-title" style="color:' + color + '">' + n.planet + ' ' + typeName + ' — ' + n.dist + ' miles away</div>' +
      '<div class="astro-result-desc">' + PLANET_ASTRO_MEANINGS[n.planet] + '</div>' +
      '</div>';
  }
  resultEl.innerHTML = h;
}

async function searchAstroLocation() {
  const query = document.getElementById('astroSearchInput').value.trim();
  const resultEl = document.getElementById('astroSearchResult');
  if (!query) return;
  resultEl.innerHTML = '<div class="astro-no-result">Searching...</div>';
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=1';
    const resp = await fetch(url, {headers: {'Accept-Language': 'en'}});
    const results = await resp.json();
    if (!results.length) { resultEl.innerHTML = '<div class="astro-no-result">Location not found.</div>'; return; }
    const {lat: latStr, lon: lonStr, display_name} = results[0];
    const qLat = parseFloat(latStr), qLon = parseFloat(lonStr);
    dropPin(qLon, qLat);
    runProximitySearch(qLon, qLat, display_name.split(',')[0]);
  } catch(e) {
    resultEl.innerHTML = '<div class="astro-no-result">Search failed: ' + e.message + '</div>';
  }
}

let astroModalCache = {};

function openAstroModal(planet, type) {

  bodyEl.className = 'sky-modal-body loading';
  bodyEl.textContent = 'Loading...';

}

async function streamAstroBlurb(planet, type, typeName, el, cacheKey) {
  const settings = getSettings();
  if (!settings.apiKey) {
    el.className = 'sky-modal-body';
    el.textContent = 'Add your API key in Settings to enable interpretations.';
    return;
  }

  const natalStr = currentChartData
    ? PLANET_ORDER.filter(p => currentChartData.pos[p] != null)
        .map(p => { const s = getSign(currentChartData.pos[p]); return (PLANET_NAMES[p]||p) + ': ' + s.sign + ' ' + s.degree.toFixed(1) + '\u00b0'; }).join(', ')
    : '';

  const typeDescriptions = {
    ac: 'Rising line (AC) — where this planet was on the eastern horizon at birth. Associated with identity, first impressions, and how you present yourself to the world.',
    dc: 'Setting line (DC) — where this planet was on the western horizon at birth. Associated with relationships, partnerships, and how you encounter others.',
    mc: 'Midheaven line (MC) — where this planet was at its highest point in the sky at birth. Associated with career, public reputation, and life direction.',
    ic: 'Nadir line (IC) — where this planet was at its lowest point at birth. Associated with home, roots, ancestry, and your inner private world.',
  };

  const prompt = [
    'You are writing a personalized astrocartography interpretation.',
    natalStr ? 'Natal chart: ' + natalStr : '',
    '',
    'Line: ' + planet + ' ' + typeName + ' (' + type.toUpperCase() + ')',
    typeDescriptions[type],
    '',
    'Planet meaning in astrocartography: ' + PLANET_ASTRO_MEANINGS[planet],
    '',
    'Write 3-4 sentences explaining what it means for this specific person to live near or visit places on their ' + planet + ' ' + typeName + ' line. Reference their natal chart placements where relevant. Be concrete about what themes, experiences, or shifts they might notice. Address the reader as "you". No em dashes, no cliches, no markdown. Dry and observational.',
  ].filter(Boolean).join('\n');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:300, stream:true, messages:[{role:'user',content:prompt}]})
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message||'API error'); }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '', first = true, full = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const ls = buf.split('\n'); buf = ls.pop();
      for (const line of ls) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const delta = JSON.parse(raw).delta?.text || '';
          if (delta) {
            if (first) { el.className = 'sky-modal-body'; el.textContent = ''; first = false; }
            el.textContent += delta;
            full += delta;
          }
        } catch(_) {}
      }
    }
    if (full) {
      try { localStorage.setItem(cacheKey, full); } catch(_) {}
    }
  } catch(e) {
    el.className = 'sky-modal-body';
    el.textContent = 'Could not load: ' + e.message;
  }
}

let mapState = { zoom: 1, panX: 0, panY: 0, isDragging: false, dragStartX: 0, dragStartY: 0, dragStartPanX: 0, dragStartPanY: 0 };

function updateViewBox() {
  const svg = document.getElementById('astroMap');
  if (!svg) return;
  const z = mapState.zoom;
  const vw = MAP_W / z;
  const vh = MAP_H / z;
  // Clamp pan so we don't go out of bounds
  const maxPanX = MAP_W - vw;
  const maxPanY = MAP_H - vh;
  mapState.panX = Math.max(0, Math.min(mapState.panX, maxPanX));
  mapState.panY = Math.max(0, Math.min(mapState.panY, maxPanY));
  svg.setAttribute('viewBox', mapState.panX + ' ' + mapState.panY + ' ' + vw + ' ' + vh);
  // Update label visibility
  document.querySelectorAll('.astro-line-label').forEach(el => {
    el.classList.toggle('visible', z >= LABEL_ZOOM_THRESHOLD);
  });

  // Update slider
  const slider = document.getElementById('astroZoomSlider');
  if (slider) slider.value = z;
  // Reposition labels for current viewport
  updateLineLabels();
  updateCityLabels();
}

function setZoom(newZoom, pivotSvgX, pivotSvgY) {
  const oldZ = mapState.zoom;
  const z = Math.max(1, Math.min(8, newZoom));
  // Zoom toward pivot point
  if (pivotSvgX !== undefined) {
    const oldVW = MAP_W / oldZ, oldVH = MAP_H / oldZ;
    const newVW = MAP_W / z, newVH = MAP_H / z;
    // Keep the pivot point fixed
    mapState.panX += (pivotSvgX / MAP_W) * (oldVW - newVW);
    mapState.panY += (pivotSvgY / MAP_H) * (oldVH - newVH);
  }
  mapState.zoom = z;
  updateViewBox();
}

function svgCoordsFromEvent(e, svg) {
  const rect = svg.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const px = (clientX - rect.left) / rect.width;
  const py = (clientY - rect.top) / rect.height;
  const vw = MAP_W / mapState.zoom, vh = MAP_H / mapState.zoom;
  return { x: mapState.panX + px * vw, y: mapState.panY + py * vh };
}

function lonLatFromSVG(svgX, svgY) {
  return {
    lon: svgX / MAP_W * 360 - 180,
    lat: 90 - svgY / MAP_H * 180
  };
}

function initMapInteraction() {
  const svg = document.getElementById('astroMap');
  if (!svg) return;

  let holdTimer = null;
  let didDrag = false;
  let lastTouchDist = null;

  // Mouse down — start drag
  svg.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('astro-line')) return;
    mapState.isDragging = true;
    didDrag = false;
    mapState.dragStartX = e.clientX;
    mapState.dragStartY = e.clientY;
    mapState.dragStartPanX = mapState.panX;
    mapState.dragStartPanY = mapState.panY;
    svg.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!mapState.isDragging) return;
    const dx = e.clientX - mapState.dragStartX;
    const dy = e.clientY - mapState.dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    const rect = svg.getBoundingClientRect();
    const vw = MAP_W / mapState.zoom, vh = MAP_H / mapState.zoom;
    mapState.panX = mapState.dragStartPanX - (dx / rect.width) * vw;
    mapState.panY = mapState.dragStartPanY - (dy / rect.height) * vh;
    updateViewBox();
  });

  window.addEventListener('mouseup', () => {
    mapState.isDragging = false;
    svg.style.cursor = 'crosshair';
  });

  // Double-click to select location
  svg.addEventListener('dblclick', (e) => {
    const coords = svgCoordsFromEvent(e, svg);
    const {lon, lat} = lonLatFromSVG(coords.x, coords.y);
    selectMapLocation(lon, lat);
  });

  // Scroll wheel to zoom
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const coords = svgCoordsFromEvent(e, svg);
    const delta = e.deltaY > 0 ? -0.3 : 0.3;
    setZoom(mapState.zoom + delta, coords.x, coords.y);
  }, {passive: false});

  // Touch: pan + pinch zoom + press-and-hold
  svg.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      didDrag = false;
      mapState.isDragging = true;
      mapState.dragStartX = e.touches[0].clientX;
      mapState.dragStartY = e.touches[0].clientY;
      mapState.dragStartPanX = mapState.panX;
      mapState.dragStartPanY = mapState.panY;
      // Press and hold
      holdTimer = setTimeout(() => {
        if (!didDrag) {
          const coords = svgCoordsFromEvent(e, svg);
          const {lon, lat} = lonLatFromSVG(coords.x, coords.y);
          selectMapLocation(lon, lat);
        }
      }, 600);
    } else if (e.touches.length === 2) {
      clearTimeout(holdTimer);
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
    e.preventDefault();
  }, {passive: false});

  svg.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && mapState.isDragging) {
      const dx = e.touches[0].clientX - mapState.dragStartX;
      const dy = e.touches[0].clientY - mapState.dragStartY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { didDrag = true; clearTimeout(holdTimer); }
      const rect = svg.getBoundingClientRect();
      const vw = MAP_W / mapState.zoom, vh = MAP_H / mapState.zoom;
      mapState.panX = mapState.dragStartPanX - (dx / rect.width) * vw;
      mapState.panY = mapState.dragStartPanY - (dy / rect.height) * vh;
      updateViewBox();
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = svg.getBoundingClientRect();
      const px = (midX - rect.left) / rect.width * MAP_W;
      const py = (midY - rect.top) / rect.height * MAP_H;
      setZoom(mapState.zoom * (dist / lastTouchDist), px, py);
      lastTouchDist = dist;
    }
    e.preventDefault();
  }, {passive: false});

  svg.addEventListener('touchend', () => {
    clearTimeout(holdTimer);
    mapState.isDragging = false;
    lastTouchDist = null;
  });

  // Zoom controls
  document.getElementById('astroZoomSlider').addEventListener('input', (e) => {
    setZoom(parseFloat(e.target.value), MAP_W / 2, MAP_H / 2);
  });
}

async function selectMapLocation(lon, lat) {
  const resultEl = document.getElementById('astroSearchResult');
  const input = document.getElementById('astroSearchInput');
  resultEl.innerHTML = '<div class="astro-no-result">Looking up location...</div>';

  // Drop pin
  dropPin(lon, lat);

  // Reverse geocode
  let cityName = lat.toFixed(2) + ', ' + lon.toFixed(2);
  try {
    const url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon;
    const resp = await fetch(url, {headers: {'Accept-Language': 'en'}});
    const data = await resp.json();
    if (data.address) {
      cityName = data.address.city || data.address.town || data.address.village || data.address.county || data.display_name.split(',')[0];
    }
  } catch(_) {}

  // Populate search bar with location name
  input.value = cityName;

  runProximitySearch(lon, lat, cityName);
}

function buildBoostKeywords() {
  const container = document.getElementById('astroBoostKeywords');
  container.innerHTML = '';

    const btn = document.createElement('button');
    btn.className = 'astro-boost-keyword';

    btn.dataset.index = i;
    btn.addEventListener('click', () => toggleBoostKeyword(i, btn));
    container.appendChild(btn);
  });
}

function toggleBoostKeyword(index, btn) {
  const kw = BOOST_KEYWORDS[index];
  if (activeBoostKeywords.has(index)) {
    activeBoostKeywords.delete(index);
    btn.classList.remove('active');
    btn.style.background = '';
    btn.style.borderColor = '';
  } else {
    activeBoostKeywords.add(index);
    const color = KEYWORD_COLORS[index % KEYWORD_COLORS.length];
    btn.classList.add('active');
    btn.style.background = color;
    btn.style.borderColor = color;
  }
  applyBoostHighlights();
}

function applyBoostHighlights() {
  // Reset all line opacities
  document.querySelectorAll('.astro-line').forEach(el => {
    el.style.opacity = '';
    el.style.filter = '';
  });

  // Remove existing city dots
  const existing = document.getElementById('astroCityLayer');
  if (existing) existing.remove();

  if (activeBoostKeywords.size === 0) return;

  // Collect all planet+type combinations to highlight
  const highlights = new Map(); // 'planet-type' -> color
  activeBoostKeywords.forEach(i => {
    const kw = BOOST_KEYWORDS[i];
    const color = KEYWORD_COLORS[i % KEYWORD_COLORS.length];
    kw.planets.forEach(planet => {
      kw.types.forEach(type => {
        const key = planet + '-' + type;
        if (!highlights.has(key)) highlights.set(key, color);
      });
    });
  });

  // Dim non-highlighted lines, color highlighted ones
  document.querySelectorAll('.astro-line').forEach(el => {
    const planet = el.getAttribute('data-planet');
    const type = el.getAttribute('data-type');
    const key = planet + '-' + type;
    if (highlights.has(key)) {
      el.style.opacity = '1';
      el.style.stroke = highlights.get(key);
    } else {
      el.style.opacity = '0.1';
    }
  });

  // Place city dots for highlighted lines
  placeCityDots(highlights);
}

function placeCityDots(highlights) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('astroMap');
  const g = document.createElementNS(ns, 'g');
  g.setAttribute('id', 'astroCityLayer');

  const THRESHOLD_MILES = 300;
  const placed = new Map(); // city name -> {x, y, colors[]}

  for (const [key, color] of highlights) {
    const [planet, type] = key.split('-');
    // Find the line data
    const lineData = astroLineData.find(l => l.planet === planet && l.type === type);
    if (!lineData) continue;

    for (const [cityName, country, cityLat, cityLon] of MAJOR_CITIES) {
      const closest = lineData.getClosestPoint(cityLon, cityLat);
      if (!closest) continue;
      const dist = gcDist(cityLat, cityLon, closest.lat, closest.lon);
      if (dist > THRESHOLD_MILES) continue;

      const cx = lonToX(cityLon), cy = latToY(cityLat);
      const cityKey = cityName + '-' + country;

      if (placed.has(cityKey)) {
        placed.get(cityKey).colors.push(color);
      } else {
        placed.set(cityKey, { cx, cy, colors: [color], name: cityName, country, lat: cityLat, lon: cityLon });
      }
    }
  }

  // Draw dots
  for (const [, city] of placed) {
    const colors = [...new Set(city.colors)];
    const dotG = document.createElementNS(ns, 'g');
    dotG.setAttribute('class', 'astro-city-dot');
    dotG.setAttribute('data-city', city.name);

    if (colors.length === 1) {
      // Single dot
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('cx', city.cx);
      circle.setAttribute('cy', city.cy);
      circle.setAttribute('r', '3');
      circle.setAttribute('fill', colors[0]);
      circle.setAttribute('stroke', '#fff');
      circle.setAttribute('stroke-width', '0.8');
      circle.setAttribute('vector-effect', 'non-scaling-stroke');
      dotG.appendChild(circle);
    } else {
      // Multiple keywords — split dot (pie slices)
      const r = 4;
      const sliceAngle = (2 * Math.PI) / colors.length;
      colors.forEach((color, i) => {
        const startAngle = i * sliceAngle - Math.PI / 2;
        const endAngle = startAngle + sliceAngle;
        const x1 = city.cx + r * Math.cos(startAngle);
        const y1 = city.cy + r * Math.sin(startAngle);
        const x2 = city.cx + r * Math.cos(endAngle);
        const y2 = city.cy + r * Math.sin(endAngle);
        const largeArc = sliceAngle > Math.PI ? 1 : 0;
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', `M ${city.cx} ${city.cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`);
        path.setAttribute('fill', color);
        path.setAttribute('vector-effect', 'non-scaling-stroke');
        dotG.appendChild(path);
      });
      // Outline
      const outline = document.createElementNS(ns, 'circle');
      outline.setAttribute('cx', city.cx);
      outline.setAttribute('cy', city.cy);
      outline.setAttribute('r', '4');
      outline.setAttribute('fill', 'none');
      outline.setAttribute('stroke', '#fff');
      outline.setAttribute('stroke-width', '0.8');
      outline.setAttribute('vector-effect', 'non-scaling-stroke');
      dotG.appendChild(outline);
    }

    // Tooltip on hover
    dotG.addEventListener('mouseenter', (e) => showCityTip(e, city));
    dotG.addEventListener('mousemove', (e) => moveCityTip(e));
    dotG.addEventListener('mouseleave', hideCityTip);
    dotG.addEventListener('click', () => {
      // Find the primary line for this city and open modal
      for (const [key, color] of highlights) {
        const [planet, type] = key.split('-');
        const lineData = astroLineData.find(l => l.planet === planet && l.type === type);
        if (!lineData) continue;
        const closest = lineData.getClosestPoint(city.lon, city.lat);
        if (!closest) continue;
        const dist = gcDist(city.lat, city.lon, closest.lat, closest.lon);
        if (dist <= THRESHOLD_MILES) {
          openAstroModal(planet, type);
          break;
        }
      }
    });

    g.appendChild(dotG);
  }

  document.getElementById('astroPins').before(g);
}

    cityTooltipEl = document.createElement('div');
    cityTooltipEl.className = 'astro-city-tip';

function fmtLon(lon) {
  if (lon == null) return '?';
  const s = getSign(lon);
  return s.sign + ' ' + s.degree.toFixed(1) + '°';
}

function aspectLabel(lonA, lonB) {
  const ASPECTS = [
    {name:'conjunct', angle:0, orb:8},
    {name:'opposite', angle:180, orb:8},
    {name:'trine', angle:120, orb:8},
    {name:'square', angle:90, orb:7},
    {name:'sextile', angle:60, orb:6},
  ];
  const diff = normDeg(lonA - lonB);
  const angle = diff > 180 ? 360 - diff : diff;
  for (const asp of ASPECTS) {
    const orb = Math.abs(angle - asp.angle);
    if (orb <= asp.orb) return asp.name + ' (orb ' + orb.toFixed(1) + '°)';
  }
  return null;
}

function getMoonPhaseData() {
  const now = new Date();
  const phase = Astronomy.MoonPhase(now); // 0-360
  const illum = Astronomy.Illumination('Moon', now);
  const moonLon = normDeg(Astronomy.EclipticGeoMoon(now).lon);
  const sign = getSign(moonLon).sign;

  let name, type;
  if (phase < 22.5 || phase >= 337.5) { name = 'New Moon'; type = 'new'; }
  else if (phase < 67.5)  { name = 'Waxing Crescent'; type = 'waxing-crescent'; }
  else if (phase < 112.5) { name = 'First Quarter';   type = 'first-quarter'; }
  else if (phase < 157.5) { name = 'Waxing Gibbous';  type = 'waxing-gibbous'; }
  else if (phase < 202.5) { name = 'Full Moon';        type = 'full'; }
  else if (phase < 247.5) { name = 'Waning Gibbous';  type = 'waning-gibbous'; }
  else if (phase < 292.5) { name = 'Last Quarter';     type = 'last-quarter'; }
  else                    { name = 'Waning Crescent';  type = 'waning-crescent'; }

  // Next new and full moon
  let nextNew = null, nextFull = null;
  try { nextNew = Astronomy.SearchMoonPhase(0, now, 40); } catch(_) {}
  try { nextFull = Astronomy.SearchMoonPhase(180, now, 40); } catch(_) {}

  return { phase, name, type, sign, illum: illum.phase_fraction, nextNew, nextFull };
}

function drawMoonSVG(type) {
  const size = 120, cx = 60, cy = 60, r = 46;
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);

  const top = cx + ' ' + (cy - r);
  const bot = cx + ' ' + (cy + r);
  const tx = {
    'waxing-crescent': r * 0.7,
    'waxing-gibbous':  r * 0.55,
    'waning-gibbous':  r * 0.55,
    'waning-crescent': r * 0.7,
  }[type];

  function addEl(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    svg.appendChild(el); return el;
  }

  if (type === 'new') {
    addEl('circle', {cx, cy, r, fill:'#c4622d'});
  } else if (type === 'full') {
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'first-quarter') {
    // Right half — straight line down center, arc on right
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 0 1 '+bot+' L '+cx+' '+(cy+r)+' L '+cx+' '+(cy-r)+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'last-quarter') {
    // Left half
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 0 0 '+bot+' L '+cx+' '+(cy+r)+' L '+cx+' '+(cy-r)+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'waxing-crescent') {
    // Right outer arc (cw) + terminator ellipse bowing left (ccw back up)
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 0 1 '+bot+' A '+tx+' '+r+' 0 0 1 '+top+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'waxing-gibbous') {
    // Full circle minus a sliver on left — outer large arc cw + terminator bowing right ccw
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 1 1 '+bot+' A '+tx+' '+r+' 0 0 0 '+top+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'waning-gibbous') {
    // Full circle minus sliver on right
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 1 0 '+bot+' A '+tx+' '+r+' 0 0 1 '+top+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  } else if (type === 'waning-crescent') {
    // Left outer arc (ccw) + terminator bowing right (cw back up)
    addEl('path', {d:'M '+top+' A '+r+' '+r+' 0 0 0 '+bot+' A '+tx+' '+r+' 0 0 0 '+top+' Z', fill:'#c4622d'});
    addEl('circle', {cx, cy, r, fill:'none', stroke:'#c4622d', 'stroke-width':'1.5'});
  }

  return svg;
}


function moonCacheKey(type, sign, isGeneral) {
  return 'moon-' + (isGeneral ? 'general' : 'personal') + '-' + type + '-' + sign;
}

async function fetchMoonBlurb(phaseData, isGeneral, el) {
  const settings = getSettings();
  if (!settings.apiKey) {
    el.className = isGeneral ? 'moon-general' : 'moon-personal';
    el.textContent = 'Add your API key in Settings to enable readings.';
    return;
  }

  const cacheKey = moonCacheKey(phaseData.type, phaseData.sign, isGeneral);
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      el.className = isGeneral ? 'moon-general' : 'moon-personal';
      el.textContent = cached;
      return;
    }
  } catch(_) {}

  el.className = (isGeneral ? 'moon-general' : 'moon-personal') + ' loading';
  el.textContent = 'Loading...';

  const natalStr = currentChartData
    ? PLANET_ORDER.filter(p => currentChartData.pos[p] != null)
        .map(p => { const s = getSign(currentChartData.pos[p]); return (PLANET_NAMES[p]||p) + ': ' + s.sign + ' ' + s.degree.toFixed(1) + '°'; }).join(', ')
    : '';

  let prompt;
  if (isGeneral) {
    prompt = 'Write 2-3 sentences on what a ' + phaseData.name + ' in ' + phaseData.sign + ' means generally for everyone. What is the collective mood or energy? No em dashes, no cliches, no "the universe is asking", no markdown. Dry and observational.';
  } else {
    prompt = [
      'The current moon phase is ' + phaseData.name + ' in ' + phaseData.sign + '.',
      natalStr ? 'This person\'s natal chart: ' + natalStr : '',
      '',
      'Write 3-4 sentences on how this specific moon phase affects this person given their natal chart. Reference their actual placements. Be specific about which natal planets or angles are activated by the moon being in ' + phaseData.sign + ' right now. Address the reader as "you". No em dashes, no cliches, no markdown. Dry and observational.',
    ].filter(Boolean).join('\n');
  }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:300, messages:[{role:'user',content:prompt}]})
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message||'API error'); }
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    if (text) {
      el.className = isGeneral ? 'moon-general' : 'moon-personal';
      el.textContent = text;
      try { localStorage.setItem(cacheKey, text); } catch(_) {}
    }
  } catch(e) {
    el.className = isGeneral ? 'moon-general' : 'moon-personal';
    el.textContent = 'Could not load: ' + e.message;
  }
}

function initMoon() {
  try {
    const data = getMoonPhaseData();

    // Draw SVG
    const wrap = document.getElementById('moonPhaseWrap');
    wrap.innerHTML = '';
    wrap.appendChild(drawMoonSVG(data.type));

    // Labels
    document.getElementById('moonPhaseName').textContent = data.name;
    document.getElementById('moonPhaseSign').textContent = 'in ' + data.sign;

    // Blurbs
    const generalEl = document.getElementById('moonGeneral');
    const personalEl = document.getElementById('moonPersonal');
    fetchMoonBlurb(data, true, generalEl);
    fetchMoonBlurb(data, false, personalEl);
    document.getElementById('moonSourcePanel').classList.remove('open');
    try { buildMoonSource(data); } catch(_) {}
  } catch(e) {
    document.getElementById('moonGeneral').textContent = 'Error: ' + e.message;
    console.error('initMoon error:', e);
  }
}

  Moon: (s) => 'Emotional tone carries ' + s + ' energy right now.',
  Mercury: (s) => 'Thinking and communication filtered through ' + s + '.',

};

function getSkyPositions() {
  const now = new Date();
  const yesterday = new Date(now.getTime() - 86400000);
  const result = {};

  for (const b of SKY_PLANET_ORDER) {
    try {
      let lonNow, lonYest;
      if (b === 'Sun') {
        lonNow = normDeg(Astronomy.SunPosition(now).elon);
        lonYest = normDeg(Astronomy.SunPosition(yesterday).elon);
      } else if (b === 'Moon') {
        lonNow = normDeg(Astronomy.EclipticGeoMoon(now).lon);
        lonYest = normDeg(Astronomy.EclipticGeoMoon(yesterday).lon);
      } else {
        lonNow = normDeg(Astronomy.Ecliptic(Astronomy.GeoVector(b, now, true)).elon);
        lonYest = normDeg(Astronomy.Ecliptic(Astronomy.GeoVector(b, yesterday, true)).elon);
      }
      let diff = normDeg(lonNow - lonYest);
      if (diff > 180) diff -= 360;
      const retro = diff < -0.001;
      result[b] = { lon: lonNow, retro };
    } catch(e) {
      result[b] = null;
    }
  }
  return result;
}

function getSkyAspects(skyPos) {
  const ASPECTS = [
    {name:'conjunct', angle:0, orb:8, glyph:'☌'},
    {name:'opposition', angle:180, orb:8, glyph:'☍'},
    {name:'trine', angle:120, orb:8, glyph:'△'},
    {name:'square', angle:90, orb:7, glyph:'□'},
    {name:'sextile', angle:60, orb:6, glyph:'⚹'},
  ];

  const ASP_DESC = {
    conjunct: 'merging — amplifies both planets',
    opposition: 'in tension — push/pull dynamic',
    trine: 'flowing — energy moves easily',
    square: 'friction — pressure that demands action',
    sextile: 'open — opportunity if you reach for it',
  };

  const aspects = [];
  const planets = SKY_PLANET_ORDER.filter(p => skyPos[p]);

  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      const a = planets[i], b = planets[j];
      const diff = normDeg(skyPos[a].lon - skyPos[b].lon);
      const angle = diff > 180 ? 360 - diff : diff;
      for (const asp of ASPECTS) {
        const orb = Math.abs(angle - asp.angle);
        if (orb <= asp.orb) {
          aspects.push({
            p1: a, p2: b,
            name: asp.name,
            glyph: asp.glyph,
            desc: ASP_DESC[asp.name],
            orb: orb.toFixed(1),
            tight: orb <= 2.5,
          });
          break;
        }
      }
    }
  }
  return aspects;
}

function buildSkyTable(skyPos) {
  const container = document.getElementById('skyTable');
  const table = document.createElement('table');
  table.className = 'sky-table';
  table.innerHTML = '<thead><tr><th>Planet</th><th>Sign</th><th>Degree</th><th style="font-size:0.6rem;color:var(--muted)">Note</th></tr></thead>';
  const tbody = document.createElement('tbody');

  for (const p of SKY_PLANET_ORDER) {
    if (!skyPos[p]) continue;
    const {lon, retro} = skyPos[p];
    const s = getSign(lon);
    const note = retro
      ? (RETROGRADE_NOTES[p] || p + ' retrograde')
      : (PLANET_IN_SIGN_NOTES[p] ? PLANET_IN_SIGN_NOTES[p](s.sign) : '');

    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (PLANET_NAMES[p] || p) + '</td>' +
      '<td>' + s.sign + (retro ? '<span class="retro-badge">Rx</span>' : '') + '</td>' +
      '<td>' + s.degree.toFixed(1) + '\u00b0</td>' +
      '<td class="sky-note">' + note + '</td>';

    tr.addEventListener('click', (function(planet, sign, deg, isRetro, fullNote) {
      return function() { openSkyModal(planet, sign, deg, isRetro, fullNote, null, null); };
    })(p, s.sign, s.degree, retro, note));

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(table);
}

function buildSkyAspectTable(aspects) {
